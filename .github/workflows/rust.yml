name: Rust-CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

    - name: Build
      run: cargo build --verbose

    - name: Clippy
      run: cargo clippy --all-targets -- -D warnings

    - name: Run tests
      run: cargo test --verbose

    - name: End-to-end check (CONNECT + UDP ASSOCIATE)
      run: |
        ./target/debug/socks5-rs -b 127.0.0.1 -p 8080 &
        server_pid=$!
        python3 .github/socks5_e2e.py
        status=$?
        kill "$server_pid" 2>/dev/null || true
        exit $status
